# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Metal on macOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        lfs: true

    - name: Setup shader build environment
      run: |
        sudo pip3 install ninja --break-system-packages

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build-macos-mtl" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }} 
        -G Ninja 
        -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} 
        -DGraphicsApi=MTL

    - name: Build Core
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{env.BUILD_TYPE}} --target KryneEngine_Core

    - name: Build Core Unit tests
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{env.BUILD_TYPE}} --target
        Core_Common_UnitTests
        Core_Graphics_UnitTests
        Core_Math_UnitTests
        Core_Memory_UnitTests
        Core_Threads_UnitTests

    - name: Build Modules
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{env.BUILD_TYPE}} --target
        KryneEngine_Modules_FileSystem
        KryneEngine_Modules_GraphicsUtils
        KryneEngine_Modules_GuiLib
        KryneEngine_Modules_ImGui
        KryneEngine_Modules_RenderGraph
        KryneEngine_Modules_Resources
        KryneEngine_Modules_SdfTexture
        KryneEngine_Modules_ShaderReflection
        KryneEngine_Modules_TextRendering

    - name: Build Modules Unit tests
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{env.BUILD_TYPE}} --target
        Modules_FileSystem_UnitTests
        Modules_GraphicsUtils_UnitTests

    - name: Build Samples
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{env.BUILD_TYPE}} --target
        HelloTriangle
        ImGuiDemo
        RenderGraphDemo
        UiDemo

#    - name: Test
#      working-directory: ${{ steps.strings.outputs.build-output-dir }}
